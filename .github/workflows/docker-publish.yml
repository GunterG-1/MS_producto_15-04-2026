name: Publicar imagen docker

on:
  push:
    branches:
      - main 

jobs:
  build-and-push:
            runs-on: ubuntu-latest
            steps:
              - name: Descargar repo
                uses: actions/checkout@v4

              - name: iniciar sesion docker
                uses: docker/login-action@v4
                with:
                  username: ${{ secrets.ACCESO_DOCKERHUB_USER }}
                  password: ${{ secrets.ACCESO_DOCKERHUB }}
              
              - name: Construir y publicar imagen
                uses: docker/build-push-action@v7
                with:
                  context: .
                  push: true
                  tags: ${{ secrets.ACCESO_DOCKERHUB_USER }}/ms.producot:latest
